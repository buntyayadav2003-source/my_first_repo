<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    .onecontainer{
        width: 600px;
        height: 600px;
        color: rgb(44, 23, 163);
        position: relative;
    }
    .redcontainer{
        width: 100px;
        height: 100px;
        color: red;
        
    }
    .greybox{
        width: 300px;
        height: 300px;
        background-color: chocolate;
        color: chartreuse;
        position: absolute;
        top: 100px;
        left: 200px;
    }
    .bordercontainer{
        width: 200px;
        height: 500px;
        border: 1px solid black;
        position: absolute;
        top: 100px;
        left: 0;
    }

    .bulebox{
        width: 200px;
        height: 100px;
        background-color: blue;
        position: absolute;
        bottom: 50px;
        right: 100px;
        border-radius: 40px 0 40px 0;
    }
   </style> 
</head>
<body>
   <div class="onecontainer"></div>
   <div class="redcontainer"></div>
   <div class="greybox"></div>
   <div class="bordercontainer"></div>
   <div class="bulebox"></div>


</body>
</html>
